# Example server configuration for rhos_cobot deployment scripts.
# Copy this file to config/servers.toml and update the values for your machine:
#   cp config/servers.example.toml config/servers.toml

# ---------------------------------------------------------------------------
# Pi0 / OpenPI policy server
# ---------------------------------------------------------------------------
[pi0]
policy_config = "your_policy_config"
port = 8001

# host is the Pi0 websocket address reachable from this machine.
# ssh_target is the optional SSH alias/target used to manage the remote tmux session.
[pi0.remote]
host = "your-pi0-service-host"
ssh_target = "your-pi0-ssh-target"
session_name = "pi0-infer"
work_dir = "/path/to/openpi-or-inference-repo"
policy_config = "your_policy_config"
checkpoint = "checkpoints/your_policy_config/your_checkpoint"

[pi0.local]
session_name = "pi0-infer-local"
# The recommended local layout is a sibling checkout:
#   /home/agilex/rhos_cobot
#   /home/agilex/openpi
openpi_root = "../openpi"
policy_config = "your_policy_config"
checkpoint = "checkpoints/your_policy_config/your_checkpoint"
cuda_visible_devices = "0"

# ---------------------------------------------------------------------------
# vLLM planner server
# ---------------------------------------------------------------------------
[vllm]
port = 8000
host = "0.0.0.0"

# host is the planner HTTP address reachable from this machine.
# ssh_target is the optional SSH alias/target used to manage the remote tmux session.
[vllm.remote]
host = "your-vllm-service-host"
ssh_target = "your-vllm-ssh-target"
session_name = "vllm-planner"
work_dir = "/path/to/llm-planner"
model_path = "/path/to/model-or-hf-cache"
served_model_name = "Qwen/Qwen3.5-4B"

[vllm.local]
session_name = "vllm-planner-local"
model_path = "/path/to/local/model"
served_model_name = "Qwen/Qwen3.5-4B"
conda_env_name = "vllm"
max_model_len = 262144
max_num_seqs = 512
# gpu_memory_utilization = 0.95

# ---------------------------------------------------------------------------
# qz planner server
# ---------------------------------------------------------------------------
# Use with:
#   PLANNER_BACKEND=qz bash scripts/run_piper_deploy.sh
# Dynamic seq/api_key values are read from config/vllm_server_state.json by default.
[qz]
state_file = "config/vllm_server_state.json"
served_model_name = "Qwen/Qwen3.5-9B"
endpoint_template = "https://qwen35-9b-{seq}-inf.openapi-qb.sii.edu.cn/v1"
proxy_url = "http://127.0.0.1:8888"

# ---------------------------------------------------------------------------
# Planner client defaults
# ---------------------------------------------------------------------------
[planner]
manipulation_replanner_enable_thinking = false
manipulation_replanner_max_tokens = 256
